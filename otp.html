<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OTP Verification | RB-Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-white flex items-center justify-center min-h-screen">

<div class="bg-slate-800 p-8 rounded-2xl w-full max-w-md shadow-lg">

    <h2 class="text-2xl font-bold mb-6 text-center">Signup with OTP</h2>

    <!-- FORM -->
    <div class="space-y-4">

        <input id="name" type="text" placeholder="Name" class="w-full p-3 rounded bg-slate-700">

        <input id="email" type="email" placeholder="Email" class="w-full p-3 rounded bg-slate-700">

        <input id="phone" type="text" placeholder="Phone Number" class="w-full p-3 rounded bg-slate-700">

        <input id="password" type="password" placeholder="Password" class="w-full p-3 rounded bg-slate-700">

        <input id="branch" type="text" placeholder="Branch" class="w-full p-3 rounded bg-slate-700">

        <!-- SEND OTP BUTTON -->
        <button onclick="sendOtp()" class="w-full bg-indigo-600 py-3 rounded hover:bg-indigo-500">
            Send OTP
        </button>

        <!-- OTP FIELD (Hidden initially) -->
        <div id="otpSection" class="hidden space-y-3">
            <input id="otp" type="text" placeholder="Enter OTP" class="w-full p-3 rounded bg-slate-700">

            <button onclick="verifyOtp()" class="w-full bg-green-600 py-3 rounded hover:bg-green-500">
                Verify & Signup
            </button>
        </div>

        <!-- MESSAGE -->
        <p id="message" class="text-sm text-center"></p>

    </div>
</div>

<script>
    const API_BASE = "https://rb-studentport-backend-production.up.railway.app";

    function showMessage(msg, color="white"){
        const el = document.getElementById("message");
        el.innerText = msg;
        el.style.color = color;
    }

    async function sendOtp() {
        const phone = document.getElementById("phone").value;

        const res = await fetch(`${API_BASE}/api/auth/send-otp`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ phoneNumber: phone })
        });

        const data = await res.json();

        if(data.success){
            showMessage("OTP Sent ✔", "lightgreen");
            document.getElementById("otpSection").classList.remove("hidden");
        } else {
            showMessage(data.message, "red");
        }
    }

    async function verifyOtp() {
        const payload = {
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            password: document.getElementById("password").value,
            phoneNumber: document.getElementById("phone").value,
            branch: document.getElementById("branch").value,
            otp: document.getElementById("otp").value
        };

        const res = await fetch(`${API_BASE}/api/auth/verify-otp`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(payload)
        });

        const data = await res.json();

        if(data.success){
            showMessage("Signup Successful 🎉", "lightgreen");
            setTimeout(()=> window.location.href="login.html", 1500);
        } else {
            showMessage(data.message, "red");
        }
    }
</script>

</body>
</html>
