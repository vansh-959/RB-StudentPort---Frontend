<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PYQs | Student Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; overflow-x: hidden; }
        .glass-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        @keyframes wave1 { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        /* Custom styling for dark selects */
        select option { background-color: #1e293b; color: white; }
        #toastContainer {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1100;
        }
        .toast {
            min-width: 260px;
            max-width: 360px;
            border-radius: 12px;
            padding: 12px 14px;
            color: #e2e8f0;
            font-size: 14px;
            border: 1px solid rgba(51, 65, 85, 0.7);
            background: rgba(15, 23, 42, 0.94);
            border-left: 4px solid #ef4444;
        }
    </style>
</head>
<body class="text-slate-200 font-sans">

    <nav class="bg-indigo-950 border-b border-indigo-900 text-white px-6 py-4 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto flex flex-col md:flex-row md:items-center md:justify-between">
        
        <input type="checkbox" id="menu" class="hidden peer">

        <div class="flex justify-between items-center w-full md:w-auto">
            <div class="flex items-center gap-2">
                <img src="logo.png" alt="Logo" class="h-14 w-auto">
                <span class="text-1xl font-black tracking-tighter">RB-PORTAL</span>
            </div>
            
            <label for="menu" class="md:hidden cursor-pointer p-2 hover:bg-white/10 rounded-lg transition-colors z-[110] relative">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white peer-checked:hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
                </svg>
            </label>
        </div>

        <ul id="mobile-menu" class="fixed top-0 right-[-100%] h-screen w-[75%] bg-indigo-950 shadow-2xl z-[120] flex flex-col p-8 space-y-6 transition-all duration-500 ease-in-out 
                   peer-checked:right-0 md:static md:h-auto md:w-auto md:bg-transparent md:shadow-none md:flex-row md:p-0 md:space-y-0 md:space-x-8 md:transition-none md:flex">
            
            <li class="md:hidden flex justify-between items-center mb-6 border-b border-indigo-800 pb-4">
                <span class="font-black text-indigo-400 uppercase tracking-[0.2em] text-xs">Navigation</span>
                <label for="menu" class="text-2xl cursor-pointer hover:rotate-90 transition-transform p-2">✕</label>
            </li>

           <li><a href="index.html" class="text-sm font-medium text-slate-300 hover:text-indigo-400 transition">Home</a></li>
    <li><a href="notice.html" class="text-sm font-medium text-slate-300 hover:text-indigo-400 transition">Notice</a></li>
    <li><a href="pyqs.html" class="text-sm font-bold text-indigo-400 border-b-2 border-indigo-400 md:pb-1 inline-block">PYQs</a></li>
    <li><a href="notes.html" class="text-sm font-medium text-slate-300 hover:text-indigo-400 transition">Notes</a></li>
    <li><a href="events.html" class="text-sm font-medium text-slate-300 hover:text-indigo-400 transition">Events</a></li>
    <li><a href="about.html" class="text-sm font-medium text-slate-300 hover:text-indigo-400 transition">About</a></li>
    <li><a href="contact.html" class="text-sm font-medium text-slate-300 hover:text-indigo-400 transition">Contact</a></li>
        </ul>

        <label for="menu" class="fixed inset-0 bg-black/60 hidden peer-checked:block md:peer-checked:hidden z-[100] backdrop-blur-sm transition-opacity"></label>
    </div>
</nav>

    <div class="max-w-6xl mx-auto py-12 px-4 relative">
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full h-full opacity-10 pointer-events-none overflow-hidden">
            <div class="absolute top-10 left-10 w-[400px] h-[400px] bg-indigo-600 rounded-full blur-[100px] animate-[wave1_30s_linear_infinite]"></div>
        </div>

        <header class="text-center mb-16 relative z-10">
            <h1 class="text-4xl md:text-6xl font-black text-white mb-4 tracking-tight">
                Academic <span class="text-indigo-500">Resources</span>
            </h1>
            <p class="text-slate-400 text-lg">Access Previous Year Question Papers and study materials efficiently.</p>
        </header>

        <div id="filterSection" class="glass-card rounded-3xl p-8 mb-16 border border-slate-800 shadow-2xl relative z-10">
            <h2 class="text-sm font-bold text-indigo-400 uppercase tracking-[0.2em] mb-6">Filter Question Papers</h2>
            <div class="grid md:grid-cols-5 gap-6">
                <div class="space-y-2">
                    <label class="text-[10px] uppercase font-bold text-slate-500 ml-2">Stream</label>
                    <select id="streamFilter" class="w-full p-4 bg-slate-900/80 border border-slate-700 rounded-2xl text-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                        <option value="">Select Stream</option>
                        <option value="engineering">⚙️ Engineering & Technology</option>
                        <option value="management">💼 Management & Commerce</option>
                        <option value="computer">💻 Computer Applications</option>
                        <option value="pharmacy">💊 Pharmacy & Healthcare</option>
                        <option value="law">⚖️ Law & Education</option>
                        <option value="sciences">🎨 Sciences, Arts & Vocational</option>
                        <option value="nursing">🩺 Nursing & Allied Health</option>
                    </select>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] uppercase font-bold text-slate-500 ml-2">Branch</label>
                    <select id="branchFilter" class="w-full p-4 bg-slate-900/80 border border-slate-700 rounded-2xl text-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all" disabled>
                        <option value="">Select Branch</option>
                    </select>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] uppercase font-bold text-slate-500 ml-2">Semester</label>
                    <select id="semesterFilter" class="w-full p-4 bg-slate-900/80 border border-slate-700 rounded-2xl text-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all" disabled>
                        <option value="">Select Semester</option>
                    </select>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] uppercase font-bold text-slate-500 ml-2">Subject</label>
                    <select id="subjectFilter" class="w-full p-4 bg-slate-900/80 border border-slate-700 rounded-2xl text-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all" disabled>
                        <option value="">Select Subject</option>
                    </select>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] uppercase font-bold text-slate-500 ml-2">Year</label>
                    <select id="yearFilter" class="w-full p-4 bg-slate-900/80 border border-slate-700 rounded-2xl text-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                        <option value="">All Years</option>
                        <option value="2025">2025</option>
                        <option value="2026">2026</option>
                        <option value="2027">2027</option>
                        <option value="2028">2028</option>
                        <option value="2029">2029</option>
                        <option value="2030">2030</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="pyqsContainer" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8 relative z-10 pb-20">
            </div>
    </div>

    <div id="toastContainer"></div>
    <script>
        function getApiBaseUrl() {
            const host = window.location.hostname;
            const protocol = window.location.protocol;
            if (!host || host === 'localhost' || host === '127.0.0.1' || protocol === 'file:') {
                return 'http://localhost:8080';
            }
            return 'https://rb-studentport-backend-production.up.railway.app';
        }

        function showToast(message) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3200);
        }

        // Check authentication
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) {
            showToast('Please login to access PYQs');
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 900);
        }

        let allPyqs = [];
        const filterSection = document.getElementById('filterSection'); 
        const container = document.getElementById("pyqsContainer");

        const branchData = {
            engineering: ["Computer Science & Engineering (CSE)", "B.Tech AI & ML", "Information Technology (IT)", "Mechanical Engineering", "Civil Engineering", "M.Tech: Mechanical Engineering", "Diploma: Engineering (Polytechnic)"],
            management: ["BBA", "MBA", "B.Com", "M.Com", "BHA", "MHA"],
            computer: ["BCA", "MCA", "B.Sc IT", "M.Sc CS"],
            pharmacy: ["B.Pharm", "D.Pharm", "M.Pharm"],
            law: ["LLB", "BA LLB", "B.Ed", "M.Ed"],
            sciences: ["B.Sc (Physics/Chem/Maths)", "B.A. (English/Hindi)", "Vocational Studies", "Fine Arts"],
            nursing: ["B.Sc Nursing", "Post Basic Nursing", "OT", "Radiology"]
        };

        const semesterData = { 
            "BCA": 6,
            "BA LLB": 10,
            "LLB": 6,
            "B.Tech AI & ML": 8,
            "Computer Science & Engineering (CSE)": 8,
            "Information Technology (IT)": 8,
            "Mechanical Engineering": 8,
            "Civil Engineering": 8,
            "M.Tech: Mechanical Engineering": 4,
            "Diploma: Engineering (Polytechnic)": 6,
            "BBA": 6,
            "MBA": 4,
            "B.Com": 6,
            "M.Com": 4,
            "BHA": 8,
            "MHA": 4,
            "MCA": 4,
            "B.Sc IT": 6,
            "M.Sc CS": 4,
            "B.Pharm": 8,
            "D.Pharm": 4,
            "M.Pharm": 4,
            "B.Sc Nursing": 8,
            "OT": 6,
            "Radiology": 6,
            "B.Ed": 4,
            "M.Ed": 4,
            "B.Sc (Physics/Chem/Maths)": 6,
            "B.A. (English/Hindi)": 6,
            "Vocational Studies": 3,
            "Fine Arts": 6,
            "Post Basic Nursing": 4
        };

        async function loadPYQS() {
            const urlParams = new URLSearchParams(window.location.search);
            const searchQuery = urlParams.get('search');
            const apiBaseUrl = getApiBaseUrl();

            if (searchQuery) {
                if (filterSection) filterSection.style.display = 'none';
                container.innerHTML = `<div class="col-span-full text-center py-12 text-indigo-400 font-bold">Searching for "${searchQuery}"...</div>`;
                
                try {
                    const response = await fetch(`${apiBaseUrl}/api/search/all?query=${encodeURIComponent(searchQuery)}`);
                    const data = await response.json();
                    let results = data.pyqs || []; 
                    renderCards(results);
                } catch (error) {
                    container.innerHTML = `<div class="col-span-full text-red-400 text-center">Connection to server failed.</div>`;
                }
            } else {
                try {
                    const response = await fetch(`${apiBaseUrl}/api/pyqs`);
                    allPyqs = await response.json();
                    container.innerHTML = `<div class="col-span-full text-center text-slate-500 py-12">Select your criteria above to explore papers.</div>`;
                } catch (error) {
                    container.innerHTML = `<div class="col-span-full text-red-500 text-center">Backend Error.</div>`;
                }
            }
        }

        // Dropdown Logic
        const streamFilter = document.getElementById("streamFilter");
        const branchFilter = document.getElementById("branchFilter");
        const semesterFilter = document.getElementById("semesterFilter");
        const subjectFilter = document.getElementById("subjectFilter");
        const yearFilter = document.getElementById("yearFilter");

        streamFilter.addEventListener("change", function () {
            branchFilter.innerHTML = '<option value="">Select Branch</option>';
            branchFilter.disabled = !this.value;
            if (branchData[this.value]) {
                branchData[this.value].forEach(branch => {
                    const option = document.createElement("option");
                    option.value = branch;
                    option.textContent = branch;
                    branchFilter.appendChild(option);
                });
            }
            resetFilters(['semesterFilter', 'subjectFilter']);
        });

        branchFilter.addEventListener("change", function () {
            semesterFilter.innerHTML = '<option value="">Select Semester</option>';
            semesterFilter.disabled = !this.value;
            const selectedBranch = this.value.trim();
            const totalSem = semesterData[selectedBranch] || 6;
            for (let i = 1; i <= totalSem; i++) {
                const option = document.createElement("option");
                option.value = i;
                option.textContent = "Semester " + i;
                semesterFilter.appendChild(option);
            }
            resetFilters(['subjectFilter']);
        });

        semesterFilter.addEventListener("change", function () {
            const branch = branchFilter.value;
            const sem = this.value;
            subjectFilter.innerHTML = '<option value="">Select Subject</option>';
            
            const filteredData = allPyqs.filter(p => p.branch === branch && p.semester == sem);

            if (filteredData.length > 0) {
                subjectFilter.disabled = false;
                const subjects = [...new Set(filteredData.map(p => p.subject))];
                subjects.forEach(sub => subjectFilter.add(new Option(sub, sub)));
                showResults();
            } else {
                subjectFilter.disabled = true;
                container.innerHTML = `<div class="col-span-full text-center py-20 opacity-40">No papers found for ${branch}, Semester ${sem}</div>`;
            }
        });

        subjectFilter.addEventListener("change", showResults);
        yearFilter.addEventListener("change", showResults);

        function showResults() {
            const filtered = allPyqs.filter(p =>
                (streamFilter.value === "" || p.stream === streamFilter.value) &&
                (branchFilter.value === "" || p.branch === branchFilter.value) &&
                (semesterFilter.value === "" || p.semester == semesterFilter.value) &&
                (subjectFilter.value === "" || p.subject === subjectFilter.value) &&
                (yearFilter.value === "" || p.year == yearFilter.value)
            );
            renderCards(filtered);
        }

        function resetFilters(ids) {
            ids.forEach(id => {
                const el = document.getElementById(id);
                el.innerHTML = `<option value="">${id === 'yearFilter' ? 'All Years' : 'Select ' + id.replace('Filter', '')}</option>`;
                el.disabled = id !== 'yearFilter';
            });
        }

        function renderCards(data) {
            container.innerHTML = "";
            if (!data || data.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-20 opacity-40">No papers found for this selection.</div>`;
                return;
            }

            data.forEach(pyq => {
                const displayTitle = pyq.subject || pyq.title || "Untitled Paper";
                container.innerHTML += `
                    <div class="glass-card rounded-3xl p-6 border border-slate-800 hover:border-indigo-500/40 transition-all duration-300 group">
                        <div class="flex justify-between items-start mb-6">
                            <h3 class="text-lg font-bold text-white group-hover:text-indigo-400 transition-colors leading-snug">${displayTitle}</h3>
                            <span class="bg-indigo-500/10 text-indigo-400 text-[10px] px-2 py-1 rounded-md font-black uppercase tracking-tighter">${pyq.year || '2025'}</span>
                        </div>
                        <div class="flex gap-2 mb-8">
                            <span class="bg-slate-800 text-slate-400 text-[10px] px-2 py-1 rounded font-bold uppercase tracking-widest">${pyq.branch}</span>
                            <span class="bg-indigo-900/30 text-indigo-300 text-[10px] px-2 py-1 rounded font-bold uppercase tracking-widest">Sem ${pyq.semester}</span>
                        </div>
                        <a href="pyqs_detail.html?id=${pyq.id}" class="w-full flex items-center justify-center bg-indigo-600 hover:bg-indigo-500 text-white py-3.5 rounded-2xl text-sm font-black transition-all shadow-xl shadow-indigo-600/10">
                            Download PDF
                        </a>
                    </div>
                `;
            });
        }
        loadPYQS();
    </script>
</body>
</html>
