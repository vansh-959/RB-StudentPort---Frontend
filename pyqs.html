<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Previous Year Question Papers</title>
<link rel="stylesheet" href="./output.css">

</head>

<body class="bg-gray-50">


    <!-- NAVBAR -->
<nav class="bg-linear-to-r from-blue-900 via-indigo-800 to-purple-800 text-white px-6 py-4">
  <div class="flex flex-col md:flex-row md:items-center md:justify-between">

    <div class="flex justify-between items-center">
      <div class="text-xl font-bold">
        <img src="logo.png" alt="Veltrix Logo" class="h-16 w-auto">
      </div>

      <label for="menu" class="md:hidden cursor-pointer text-2xl">☰</label>
    </div>

    <input type="checkbox" id="menu" class="hidden peer">

    <ul class="hidden peer-checked:flex flex-col mt-4 space-y-2
               md:flex md:flex-row md:mt-0 md:space-y-0 md:space-x-6">
      <li><a href="home.html" class="hover:text-yellow-300">Home</a></li>
      <li><a href="notice.html" class="hover:text-yellow-300">Notice</a></li>
      <li><a href="pyqs.html" class="hover:text-yellow-300">PYQs</a></li>
      <li><a href="events.html" class="hover:text-yellow-300">Events</a></li>
      <li><a href="about.html" class="hover:text-yellow-300">About</a></li>
      <li><a href="contact.html" class="hover:text-yellow-300">Contact</a></li>
    </ul>

  </div>
</nav>

<div class="max-w-6xl mx-auto py-12 px-4">

<!-- PAGE TITLE -->
<h1 class="text-4xl font-bold text-center text-indigo-700 mb-10">
📚 Previous Year Question Papers
</h1>

<!-- FILTER CARD -->
<div class="bg-white shadow-lg rounded-xl p-6 mb-10">

<h2 class="text-lg font-semibold text-grey-900 mb-4">
Filter Question Papers
</h2>

<div class="grid md:grid-cols-3 gap-4">

<!-- STREAM -->
<select id="streamFilter"
class="p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500">
<option value="">Select Stream</option>
<option value="engineering">Engineering</option>
<option value="management">Management</option>
<option value="computer">Computer Applications</option>
<option value="pharmacy">Pharmacy</option>
<option value="law">Law</option>
<option value="sciences">Sciences</option>
</select>

<!-- BRANCH -->
<select id="branchFilter"
class="p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500">
<option value="">Select Branch</option>
</select>

<!-- SEMESTER -->
<select id="semesterFilter"
class="p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500">
<option value="">Select Semester</option>
</select>

</div>

</div>

<!-- RESULTS -->
<div id="pyqsContainer"
class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

</div>

<script>

let allPyqs = [];

const branchData = {
engineering:[
"Computer Science & Engineering (CSE)",
"B.Tech AI & ML",
"Information Technology (IT)",
"Mechanical Engineering",
"Civil Engineering"
],
management:["BBA","MBA","B.Com","M.Com"],
computer:["BCA","MCA","B.Sc IT","M.Sc CS"],
pharmacy:["B.Pharm","D.Pharm"],
law:["LLB","BA LLB"],
sciences:["B.Sc","B.A","Fine Arts"]
};

async function loadPYQS(){

const response = await fetch("http://localhost:8080/pyqs");
allPyqs = await response.json();

}

loadPYQS();

const streamFilter = document.getElementById("streamFilter");
const branchFilter = document.getElementById("branchFilter");
const semesterFilter = document.getElementById("semesterFilter");

streamFilter.addEventListener("change", function(){

const stream = this.value;

branchFilter.innerHTML = '<option value="">Select Branch</option>';

if(branchData[stream]){

branchData[stream].forEach(branch =>{

const option = document.createElement("option");
option.value = branch;
option.textContent = branch;

branchFilter.appendChild(option);

});

}

});

const semesterData = {
  "BCA": 6,
  "MCA": 4,
  "B.Sc IT": 6,
  "M.Sc CS": 4,
  "B.Tech AI & ML": 8,
  "Computer Science & Engineering (CSE)": 8,
  "Information Technology (IT)": 8,
  "Mechanical Engineering": 8,
  "Civil Engineering": 8,
  "BBA": 6,
  "MBA": 4,
  "B.Com": 6,
  "M.Com": 4,
  "B.Pharm": 8,
  "D.Pharm": 4,
  "LLB": 3,
  "BA LLB": 10,
  "B.Sc": 6,
  "B.A": 6,
  "Fine Arts": 6
};

branchFilter.addEventListener("change", function(){

semesterFilter.innerHTML = '<option value="">Select Semester</option>';

const selectedBranch = this.value.trim();
const totalSem = semesterData[selectedBranch] || 6;

for(let i=1;i<=totalSem;i++){

const option = document.createElement("option");
option.value = i;
option.textContent = "Semester " + i;

semesterFilter.appendChild(option);

}

});

semesterFilter.addEventListener("change", showResults);

function showResults(){

const stream = streamFilter.value;
const branch = branchFilter.value;
const semester = semesterFilter.value;

const container = document.getElementById("pyqsContainer");
container.innerHTML="";

const filtered = allPyqs.filter(p =>
p.stream === stream &&
p.branch === branch &&
p.semester == semester
);

if(filtered.length === 0){

container.innerHTML = `
<div class="col-span-full text-center text-gray-500 text-lg">
No question papers found.
</div>
`;

return;
}

filtered.forEach(pyq =>{

const card = `
<div class="bg-white rounded-xl shadow-md hover:shadow-xl transition p-6">

<h2 class="text-xl font-bold text-indigo-700 mb-2">
${pyq.subject}
</h2>

<p class="text-sm text-gray-600 mb-4">
Year: ${pyq.year}
</p>

<a href="pyqs_detail.html?id=${pyq.id}"
class="inline-block bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-semibold">

View Paper

</a>

</div>
`;

container.innerHTML += card;

});

}

</script>

</body>
</html>
