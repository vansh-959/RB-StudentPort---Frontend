<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Intelligence | RB-Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: #e2e8f0; }
        .glass-card { 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(51, 65, 85, 0.5); 
        }
        .shimmer {
            background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="min-h-screen pb-20">

    <nav class="border-b border-slate-800 bg-slate-950/50 sticky top-0 z-50 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="text-xl font-black tracking-tighter text-white">RB-Portal</span>
            </div>
            <a href="index.html" class="text-sm text-slate-400 hover:text-white transition">← Back to Home</a>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 py-12">
        <div class="mb-12">
            <h1 class="text-4xl font-bold text-white mb-2">Search <span class="text-indigo-500">Intelligence</span></h1>
            <p id="search-status" class="text-slate-400 uppercase tracking-widest text-xs font-bold">Initializing Analysis...</p>
        </div>

        <div id="results-wrapper" class="space-y-12">
            <div id="loading-state" class="space-y-4">
                <div class="h-12 w-48 shimmer rounded-lg"></div>
                <div class="h-32 w-full shimmer rounded-2xl"></div>
                <div class="h-32 w-full shimmer rounded-2xl"></div>
            </div>
        </div>

        <div id="no-results" class="hidden flex flex-col items-center justify-center py-20 text-center">
            <div class="text-6xl mb-4">🔍</div>
            <h2 class="text-2xl font-bold text-white">Zero Matches Found</h2>
            <p class="text-slate-500 mt-2">Try searching with different keywords like 'DBMS', 'Internal' or 'CSE'</p>
        </div>
    </main>

    <script>
        const wrapper = document.getElementById('results-wrapper');
        const statusText = document.getElementById('search-status');
        const noResults = document.getElementById('no-results');

        // URL ton query kaddna
        const urlParams = new URLSearchParams(window.location.search);
        const query = urlParams.get('q');

        if (!query || query.trim() === "") {
            window.location.href = 'index.html';
        } else {
            statusText.innerText = `SHOWING ANALYSIS FOR QUERY: "${query}"`;
            fetchResults(query);
        }

        async function fetchResults(q) {
            try {
                // Backend API Call (GlobalSearchController endpoint)
                const response = await fetch(`https://rb-studentport-backend-production.up.railway.app/api/search/all?query=${encodeURIComponent(q)}`);
                const data = await response.json();

                wrapper.innerHTML = ""; // Clear loader
                
                let hasAnyResult = false;

                // 1. NOTICES SECTION
                if (data.notices && data.notices.length > 0) {
                    hasAnyResult = true;
                    renderSection("Latest Notices", data.notices, 'title', 'indigo', 'notice.html');
                }

                // 2. PYQS SECTION
                if (data.pyqs && data.pyqs.length > 0) {
                    hasAnyResult = true;
                    renderPyqs(data.pyqs);
                }

                // 3. NOTES SECTION
                if (data.notes && data.notes.length > 0) {
                    hasAnyResult = true;
                    renderNotes(data.notes);
                }

                // 4. EVENTS SECTION
                if (data.events && data.events.length > 0) {
                    hasAnyResult = true;
                    renderSection("Campus Events", data.events, 'title', 'amber', 'events.html');
                }

                if (!hasAnyResult) {
                    noResults.classList.remove('hidden');
                }

            } catch (error) {
                console.error("Search Error:", error);
                statusText.innerText = "ERROR CONNECTING TO SERVER";
                statusText.classList.add('text-red-500');
            }
        }

        function renderSection(title, items, displayField, color, link) {
            const section = document.createElement('div');
            section.innerHTML = `
                <h2 class="text-sm font-black text-slate-500 uppercase tracking-[0.2em] mb-4">${title}</h2>
                <div class="grid gap-3">
                    ${items.map(item => `
                        <a href="${link}" class="glass-card p-5 rounded-2xl flex items-center justify-between hover:bg-slate-800/50 transition group">
                            <div>
                                <h3 class="text-white font-medium group-hover:text-${color}-400 transition">${item[displayField]}</h3>
                                <p class="text-xs text-slate-500 mt-1 uppercase">Academic Document</p>
                            </div>
                            <span class="text-slate-600 group-hover:text-white">→</span>
                        </a>
                    `).join('')}
                </div>
            `;
            wrapper.appendChild(section);
        }

        function renderNotes(notes) {
            const section = document.createElement('div');
            section.innerHTML = `
                <h2 class="text-sm font-black text-slate-500 uppercase tracking-[0.2em] mb-4">Academic Notes</h2>
                <div class="grid gap-3">
                    ${notes.map(item => `
                        <a href="notes-detail.html?id=${item.id}" class="glass-card p-5 rounded-2xl flex items-center justify-between hover:bg-slate-800/50 transition group">
                            <div>
                                <h3 class="text-white font-medium group-hover:text-emerald-400 transition">${item.subjectName}</h3>
                                <p class="text-xs text-slate-500 mt-1 uppercase">Academic Document</p>
                            </div>
                            <span class="text-slate-600 group-hover:text-white">→</span>
                        </a>
                    `).join('')}
                </div>
            `;
            wrapper.appendChild(section);
        }

        function renderPyqs(pyqs) {
            const section = document.createElement('div');
            section.innerHTML = `
                <h2 class="text-sm font-black text-slate-500 uppercase tracking-[0.2em] mb-4">Question Papers</h2>
                <div class="grid gap-3">
                    ${pyqs.map(item => `
                        <div class="glass-card p-6 rounded-2xl border-l-4 border-indigo-500">
                            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                                <div>
                                    <h3 class="text-white font-bold text-lg">${item.subject}</h3>
                                    <div class="flex flex-wrap gap-2 mt-2">
                                        <span class="text-[10px] bg-slate-800 px-2 py-1 rounded text-slate-400 uppercase font-bold">${item.branch}</span>
                                        <span class="text-[10px] bg-indigo-900/30 px-2 py-1 rounded text-indigo-400 uppercase font-bold">Sem ${item.semester}</span>
                                    </div>
                                </div>
                                <button onclick="window.location.href='https://rb-studentport-backend-production.up.railway.app/uploads/pyqs/${item.fileName}'" 
                                    class="bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-bold py-3 px-6 rounded-xl transition shadow-lg shadow-indigo-500/20">
                                    Download PDF
                                </button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            wrapper.appendChild(section);
        }
    </script>
</body>
</html>
