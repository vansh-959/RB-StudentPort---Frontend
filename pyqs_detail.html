<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pyq Details</title>
  <link rel="stylesheet" href="./output.css">
</head>

<body class="bg-gray-50">

<div class="max-w-3xl mx-auto px-4 py-12 bg-white shadow rounded mt-10">
  <h1 id="title" class="text-2xl font-bold text-gray-800 mb-4"></h1>
  <p id="description" class="text-gray-600 text-lg"></p>

  <a href="pyqs.html" class="inline-block mt-6 text-blue-600 hover:underline">
    ← Back to Pyqs
  </a>
</div>


<script>
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");

  fetch(`http://localhost:8080/pyqs/${id}`)
    .then(res => res.json())
    .then(data => {

      document.getElementById("title").innerText = data.subject;

      document.getElementById("description").innerHTML = `
        <b>Stream:</b> ${data.stream}<br>
        <b>Branch:</b> ${data.branch}<br>
        <b>Semester:</b> ${data.semester}<br>
        <b>Year:</b> ${data.year}
      `;

      const pdfLink = document.createElement("a");
      pdfLink.href = "http://localhost:8080/uploads/pyqs/" + data.fileName;
      pdfLink.target = "_blank";
      pdfLink.className = "block mt-6 text-purple-600 font-semibold hover:underline";
      pdfLink.innerText = "View Question Paper";

      document.querySelector(".max-w-3xl").appendChild(pdfLink);
    })
    .catch(error => console.error("Error:", error));
</script>


</body>
</html>
