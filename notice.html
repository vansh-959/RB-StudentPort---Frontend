<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notices | Student Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; overflow-x: hidden; }
        .glass-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        @keyframes wave1 { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-slate-200 font-sans">

    <nav class="bg-indigo-950 border-b border-indigo-900 text-white px-6 py-4 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto flex flex-col md:flex-row md:items-center md:justify-between">
        <input type="checkbox" id="menu" class="hidden peer">
        
        <div class="flex justify-between items-center w-full md:w-auto">
            <div class="flex items-center gap-2">
                <img src="logo.png" alt="Logo" class="h-14 w-auto">
                <span class="text-1xl font-black tracking-tighter">RB-PORTAL</span>
            </div>
            
            <label for="menu" class="md:hidden cursor-pointer p-2 hover:bg-white/10 rounded-lg transition-colors z-[110] relative">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white peer-checked:hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
                </svg>
            </label>
        </div>

        <ul id="mobile-menu" class="fixed top-0 right-[-100%] h-screen w-[75%] bg-indigo-950 shadow-2xl z-[120] flex flex-col p-8 space-y-6 transition-all duration-500 ease-in-out 
                   peer-checked:right-0 md:static md:h-auto md:w-auto md:bg-transparent md:shadow-none md:flex-row md:p-0 md:space-y-0 md:space-x-8 md:transition-none md:flex">
            
            <li class="md:hidden flex justify-between items-center mb-6 border-b border-indigo-800 pb-4">
                <span class="font-black text-indigo-400 uppercase tracking-[0.2em] text-xs">Navigation</span>
                <label for="menu" class="text-2xl cursor-pointer hover:rotate-90 transition-transform p-2">✕</label>
            </li>

            <li><a href="index.html" class="text-sm font-medium text-slate-300 hover:text-indigo-400 transition">Home</a></li>
    <li><a href="notice.html" class="text-sm font-bold text-indigo-400 border-b-2 border-indigo-400 md:pb-1 inline-block">Notice</a></li>
    <li><a href="pyqs.html" class="text-sm font-medium text-slate-300 hover:text-indigo-400 transition">PYQs</a></li>
    <li><a href="notes.html" class="text-sm font-medium text-slate-300 hover:text-indigo-400 transition">Notes</a></li>
    <li><a href="events.html" class="text-sm font-medium text-slate-300 hover:text-indigo-400 transition">Events</a></li>
    <li><a href="about.html" class="text-sm font-medium text-slate-300 hover:text-indigo-400 transition">About</a></li>
    <li><a href="contact.html" class="text-sm font-medium text-slate-300 hover:text-indigo-400 transition">Contact</a></li>
        </ul>

        <label for="menu" class="fixed inset-0 bg-black/60 hidden peer-checked:block md:peer-checked:hidden z-[100] backdrop-blur-sm transition-opacity"></label>
    </div>
</nav>

    <header class="relative py-16 px-4 bg-[#0f172a] overflow-hidden">
        <div class="absolute inset-0 opacity-10 pointer-events-none">
            <div class="absolute -top-20 -left-20 w-[500px] h-[500px] bg-indigo-600 rounded-full blur-[120px] animate-[wave1_25s_linear_infinite]"></div>
        </div>
        <div class="max-w-6xl mx-auto relative z-10">
            <h1 class="text-4xl md:text-5xl font-black text-white mb-4 tracking-tight">
                Notices & <span class="text-indigo-500">Announcements</span>
            </h1>
            <p class="text-slate-400 text-lg max-w-2xl">Stay updated with the latest academic news, deadlines, and university proclamations.</p>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-12">
        <div id="noticeList" class="space-y-4">
            <div class="p-10 text-center text-slate-500 animate-pulse">Loading latest notices...</div>
        </div>
    </main>

    <script>
        fetch("http://localhost:8080/notices")
            .then(response => response.json())
            .then(data => {
                const noticeList = document.getElementById("noticeList");
                noticeList.innerHTML = "";

                if (data.length === 0) {
                    noticeList.innerHTML = `<div class="glass-card p-10 text-center rounded-3xl text-slate-500">No notices available at the moment.</div>`;
                    return;
                }

                data.forEach((notice, index) => {
                    noticeList.innerHTML += `
                        <div class="glass-card flex flex-col md:flex-row md:items-center md:justify-between p-6 md:p-8 rounded-2xl gap-6 border border-slate-800 hover:border-indigo-500/50 transition-all duration-300 group">
                            <div class="flex-1">
                                <div class="flex items-center gap-3 mb-2">
                                    <h2 class="text-xl font-bold text-white group-hover:text-indigo-400 transition-colors">
                                        ${notice.title}
                                    </h2>
                                    ${index < 3 ? `
                                        <span class="bg-indigo-500/20 text-indigo-400 text-[10px] font-black px-2 py-0.5 rounded border border-indigo-500/30">NEW</span>
                                    ` : ''}
                                </div>
                                <p class="text-slate-400 text-sm leading-relaxed max-w-3xl">
                                    ${notice.description}
                                </p>
                            </div>

                            <div class="flex items-center">
                                <a href="notice-detail.html?id=${notice.id}"
                                   class="inline-flex items-center gap-2 px-5 py-2.5 bg-slate-800 text-indigo-400 font-bold text-sm rounded-xl hover:bg-indigo-600 hover:text-white transition-all">
                                   View Full Notice <span class="text-lg">→</span>
                                </a>
                            </div>
                        </div>
                    `;
                });
            })
            .catch(error => {
                console.error("Error loading notices:", error);
                document.getElementById("noticeList").innerHTML = `<div class="text-red-400 p-5">Failed to load notices. Please check your backend connection.</div>`;
            });
    </script>

</body>
</html>
