<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Notices | College Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="./output.css">
</head>

<body class="bg-gray-50">

<!-- NAVBAR -->
<nav class="bg-linear-to-r from-blue-900 via-indigo-800 to-purple-800 text-white px-6 py-4">
  <div class="flex flex-col md:flex-row md:items-center md:justify-between">

    <div class="flex justify-between items-center">
      <div class="text-xl font-bold">
        <img src="logo.png" alt="Veltrix Logo" class="h-16 w-auto">
      </div>

      <label for="menu" class="md:hidden cursor-pointer text-2xl">☰</label>
    </div>

    <input type="checkbox" id="menu" class="hidden peer">

    <ul class="hidden peer-checked:flex flex-col mt-4 space-y-2
               md:flex md:flex-row md:mt-0 md:space-y-0 md:space-x-6">
      <li><a href="index.html" class="hover:text-yellow-300">Home</a></li>
      <li><a href="notice.html" class="hover:text-yellow-300">Notice</a></li>
      <li><a href="pyqs.html" class="hover:text-yellow-300">PYQs</a></li>
      <li><a href="events.html" class="hover:text-yellow-300">Events</a></li>
      <li><a href="about.html" class="hover:text-yellow-300">About</a></li>
      <li><a href="contact.html" class="hover:text-yellow-300">Contact</a></li>
    </ul>

  </div>
</nav>

<div class="mt-10"></div>

<!-- NOTICE SECTION -->
<section class="max-w-6xl mx-auto px-4 py-12">

  <h1 class="text-3xl font-bold text-gray-800 mb-6">
    Notices & Announcements
  </h1>

  <!-- NOTICE LIST (DYNAMIC) -->
  <div id="noticeList" class="bg-white rounded-lg shadow divide-y">
    <p class="p-5 text-gray-500">Loading notices...</p>
  </div>

</section>

<!-- JAVASCRIPT -->
<script>
  fetch("http://localhost:8080/notices")
    .then(response => response.json())
    .then(data => {
      const noticeList = document.getElementById("noticeList");
      noticeList.innerHTML = "";

      if (data.length === 0) {
        noticeList.innerHTML =
          `<p class="p-5 text-gray-500">No notice is available</p>`;
        return;
      }

      data.forEach((notice, index) => {
        noticeList.innerHTML += `
          <div class="flex flex-col md:flex-row md:items-center md:justify-between p-5 gap-4">
            <div>
              <h2 class="text-lg font-semibold text-gray-800">
                ${notice.title}
              </h2>
              <p class="text-sm text-gray-500 mt-1">
                ${notice.description}
              </p>
            </div>

            <div class="flex items-center gap-3">
              ${index < 3 ? `
              <span class="bg-red-500 text-white text-xs px-2 py-1 rounded-full ">
                NEW
                </span>
                ` : ``}
              
              <a href="notice-detail.html?id=${notice.id}"
              class="text-blue-600 font-medium hover:underline">
              View Notice →
              </a>
            </div>

          </div>
        `;
      });
    })
    .catch(error => {
      console.error("Error loading notices:", error);
    });
</script>

</body>
</html>
