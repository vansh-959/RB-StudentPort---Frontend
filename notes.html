<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Notes | Veltrix Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; }
        /* Glassmorphism Effect */
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* Style for Select Dropdowns in Dark Mode */
        select option { background-color: #1e293b; color: white; }
    </style>
</head>
<body class="text-slate-200 font-sans min-h-screen">

    <nav class="bg-indigo-950 border-b border-indigo-900 text-white px-6 py-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row md:items-center md:justify-between">
            <div class="flex justify-between items-center w-full md:w-auto">
                <div class="flex items-center gap-2">
                    <span class="text-2xl font-black tracking-tighter">VELTRIX</span>
                </div>
            </div>
            <ul class="hidden md:flex space-x-8 text-sm font-medium">
               <li><a href="index.html" class="text-sm font-medium text-slate-300 hover:text-indigo-400 transition">Home</a></li>
    <li><a href="notice.html" class="text-sm font-medium text-slate-300 hover:text-indigo-400 transition">Notice</a></li>
    <li><a href="pyqs.html" class="text-sm font-medium text-slate-300 hover:text-indigo-400 transition">PYQs</a></li>
    <li><a href="notes.html" class="text-sm font-bold text-indigo-400 border-b-2 border-indigo-400 md:pb-1 inline-block">Notes</a></li>
    <li><a href="events.html" class="text-sm font-medium text-slate-300 hover:text-indigo-400 transition">Events</a></li>
    <li><a href="about.html" class="text-sm font-medium text-slate-300 hover:text-indigo-400 transition">About</a></li>
    <li><a href="contact.html" class="text-sm font-medium text-slate-300 hover:text-indigo-400 transition">Contact</a></li>
            </ul>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto py-12 px-4">
        <div class="text-center mb-12">
            <h1 class="text-4xl md:text-5xl font-extrabold text-white mb-4">📚 Study <span class="text-indigo-500">Material</span></h1>
            <p class="text-slate-400 text-lg">Download chapter-wise notes and syllabus-specific resources.</p>
        </div>

        <div class="glass-card shadow-2xl rounded-2xl p-6 md:p-8 mb-10 border border-slate-700">
            <h2 class="text-sm font-bold text-slate-500 uppercase mb-6 tracking-widest flex items-center gap-2">
                <svg class="w-4 h-4 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"></path></svg>
                Filter Options
            </h2>

            <div class="grid grid-cols-1 md:grid-cols-5 gap-4"> 
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 ml-1">Stream</label>
                    <select id="streamFilter" class="w-full bg-[#0f172a] border border-slate-700 rounded-xl p-3 text-sm text-white outline-none focus:border-indigo-500 transition shadow-inner cursor-pointer">
                        <option value="">Select Stream</option>
                        <option value="engineering">Engineering</option>
                        <option value="management">Management</option>
                        <option value="computer">Computer Applications</option>
                        <option value="pharmacy">Pharmacy</option>
                    </select>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 ml-1">Branch</label>
                    <select id="branchFilter" class="w-full bg-[#0f172a] border border-slate-700 rounded-xl p-3 text-sm text-white outline-none focus:border-indigo-500 transition shadow-inner cursor-pointer" disabled>
                        <option value="">Select Branch</option>
                    </select>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 ml-1">Semester</label>
                    <select id="semesterFilter" class="w-full bg-[#0f172a] border border-slate-700 rounded-xl p-3 text-sm text-white outline-none focus:border-indigo-500 transition shadow-inner cursor-pointer" disabled>
                        <option value="">Select Semester</option>
                    </select>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 ml-1 text-indigo-400">Subject</label>
                    <select id="subjectFilter" class="w-full bg-[#0f172a] border border-slate-700 rounded-xl p-3 text-sm text-white outline-none focus:border-indigo-500 transition shadow-inner cursor-pointer" disabled>
                        <option value="">Select Subject</option>
                    </select>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 ml-1">Year</label>
                    <select id="yearFilter" class="w-full bg-[#0f172a] border border-slate-700 rounded-xl p-3 text-sm text-white outline-none focus:border-indigo-500 transition shadow-inner cursor-pointer">
                        <option value="">All Years</option>
                        <option value="2026">2026</option>
                        <option value="2025">2025</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="notesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mt-12">
            <div class="col-span-full text-center py-20 text-slate-500 italic">
                Select Stream, Branch, and Semester to view available notes.
            </div>
        </div>
    </main>

    <script>
    let allNotes = [];

    const streamFilter = document.getElementById("streamFilter");
    const branchFilter = document.getElementById("branchFilter");
    const semesterFilter = document.getElementById("semesterFilter");
    const subjectFilter = document.getElementById("subjectFilter");
    const yearFilter = document.getElementById("yearFilter");
    const notesGrid = document.getElementById("notesGrid");

    const branchData = {
        engineering: ["Computer Science & Engineering (CSE)", "B.Tech AI & ML", "Information Technology (IT)", "Mechanical Engineering", "Civil Engineering"],
        management: ["BBA", "MBA", "B.Com", "M.Com"],
        computer: ["BCA", "MCA", "B.Sc IT", "M.Sc CS"],
        pharmacy: ["B.Pharm", "D.Pharm"]
    };

    async function fetchNotes() {
        try {
            const response = await fetch("http://localhost:8080/api/notes");
            allNotes = await response.json();
            console.log("1. Backend Data Loaded:", allNotes);
        } catch (error) {
            console.error("Backend Error:", error);
        }
    }

    streamFilter.addEventListener("change", function() {
        branchFilter.innerHTML = '<option value="">Select Branch</option>';
        branchFilter.disabled = !this.value;
        if (branchData[this.value]) {
            branchData[this.value].forEach(b => branchFilter.add(new Option(b, b)));
        }
        resetFilters(['semesterFilter', 'subjectFilter']);
    });

    branchFilter.addEventListener("change", function() {
        semesterFilter.innerHTML = '<option value="">Select Semester</option>';
        semesterFilter.disabled = !this.value;
        for (let i = 1; i <= 8; i++) semesterFilter.add(new Option(`Semester ${i}`, i));
        resetFilters(['subjectFilter']);
    });

    semesterFilter.addEventListener("change", function() {
        const branch = branchFilter.value;
        const sem = this.value;
        subjectFilter.innerHTML = '<option value="">Select Subject</option>';
        
        // Initial search and filter for subjects based on branch and semester
        const filteredData = allNotes.filter(n => n.branch.trim() === branch.trim() && n.semester == sem);

        if (filteredData.length > 0) {
            subjectFilter.disabled = false;
            const subjects = [...new Set(filteredData.map(n => n.subjectName))];
            subjects.forEach(sub => subjectFilter.add(new Option(sub, sub)));
            
            // Render results applying existing filters including Year
            showResults(); 
        } else {
            subjectFilter.disabled = true;
            notesGrid.innerHTML = `<p class="col-span-full text-center py-20 text-slate-500 italic">No notes found for ${branch}, Semester ${sem}</p>`;
        }
    });

    [subjectFilter, yearFilter].forEach(el => el.addEventListener("change", showResults));

    // 🟢 UPDATED: Filter logic to include Year validation
    function showResults() {
        const branch = branchFilter.value;
        const sem = semesterFilter.value;
        const sub = subjectFilter.value;
        const selectedYear = yearFilter.value; // Year dropdown di value chako

        if (!branch || !sem) return;

        // Step 1: Branch te Semester naal filter karo
        let filtered = allNotes.filter(n => n.branch.trim() === branch.trim() && n.semester == sem);
        
        // Step 2: Subject filter (je select kita hai)
        if (sub) {
            filtered = filtered.filter(n => n.subjectName.trim() === sub.trim());
        }

        // Step 3: 🔴 BUG FIX - Year filter properly apply karo
        if (selectedYear && selectedYear !== "") {
            filtered = filtered.filter(n => n.year == selectedYear);
        }

        renderCards(filtered);
    }

    function renderCards(data) {
        notesGrid.innerHTML = "";
        
        // 🟢 Check if data is empty after filtering
        if (data.length === 0) {
            notesGrid.innerHTML = `<p class="col-span-full text-center py-20 text-slate-500 italic">No notes found for the selected criteria.</p>`;
            return;
        }

        data.forEach(note => {
            notesGrid.innerHTML += `
                <div class="glass-card rounded-2xl p-6 border-l-4 border-indigo-500 hover:bg-slate-800 transition-all shadow-xl">
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="text-xl font-bold text-white">${note.subjectName}</h3>
                        <span class="text-[10px] font-bold text-indigo-400 uppercase bg-indigo-500/10 px-2 py-1 rounded">Year: ${note.year}</span>
                    </div>
                    <p class="text-slate-400 text-sm mb-6 line-clamp-2">${note.description || 'Verified resources.'}</p>
                    <a href="notes-detail.html?id=${note.id}" class="w-full block bg-indigo-600 text-center py-3 rounded-xl font-bold text-white hover:bg-indigo-500 transition-all">
                        View Details
                    </a>
                </div>`;
        });
    }

    function resetFilters(ids) {
        ids.forEach(id => {
            const el = document.getElementById(id);
            el.innerHTML = `<option value="">Select ${id.replace('Filter', '')}</option>`;
            el.disabled = true;
        });
    }

    fetchNotes();
</script>
</body>
</html>
