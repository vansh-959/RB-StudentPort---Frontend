</head>
<body>
 <nav class="bg-linear-to-r from-blue-900 via-indigo-800 to-purple-800 text-white px-6 py-4">
  <div class="flex flex-col md:flex-row md:items-center md:justify-between">
    
    <!-- Logo + Menu Button -->
    <div class="flex justify-between items-center">
      <div class="text-xl font-bold">
        <div class="flex items-center gap-2">
          <img src="logo.png" alt="Veltrix Logo" class="h-16 w-auto">
        </div>
      </div>

      <!-- Hamburger (sirf mobile pe) -->
      <label for="menu" class="md:hidden cursor-pointer text-2xl ">
        ☰
      </label>
    </div>

    <!-- 🔴 YAHAN LAO (sirf ye line move hui) -->
    <input type="checkbox" id="menu" class="hidden peer">

    <!-- Menu (SINGLE) -->
    <ul
      class="
        hidden
        peer-checked:flex
        flex-col
        mt-4
        space-y-2

        md:flex
        md:flex-row
        md:mt-0
        md:space-y-0
        md:space-x-6
      "
    >
      <li><a href="index.html" class="text-sm sm:text-base hover:text-yellow-300 transition">Home</a></li>
      <li><a href="notice.html" class="text-sm sm:text-base hover:text-yellow-300 transition">Notice</a></li>
      <li><a href="pyqs.html" class="text-sm sm:text-base hover:text-yellow-300 transition">PYQs</a></li>
      <li><a href="events.html" class="text-sm sm:text-base hover:text-yellow-300 transition">Events</a></li>
      <li><a href="about.html" class="text-sm sm:text-base hover:text-yellow-300 transition">About</a></li>
      <li><a href="contact.html" class="text-sm sm:text-base hover:text-yellow-300 transition">Contact</a></li>
    </ul>

  </div>
</nav>












<main class="relative min-h-screen flex flex-col items-center px-6 overflow-hidden
         bg-white
         bg-[length:300%_300%]
         animate-[softMove_18s_ease-in-out_infinite]">
         <div class="flex flex-col items-center text-center pt-24"></div>

         <div class="absolute inset-0 opacity-40 pointer-events-none">
  <div class="absolute -top-20 -left-20 w-[600px] h-[600px] bg-cyan-300 rounded-full blur-3xl
              animate-[wave1_25s_linear_infinite]"></div>

  <div class="absolute top-40 -right-32 w-[500px] h-[500px] bg-purple-300 rounded-full blur-3xl
              animate-[wave2_30s_linear_infinite]"></div>
</div>

<section class="max-w-4xl mx-auto text-center mt-10">
  <h1 class="text-4xl text-black font-bold mb-4">
    Rayat Bahra Professional University
  </h1>

  <p class="text-gray-600">
    A student-developed academic portal interface for notices, events, and previous year question papers.
  </p>
</section>


<div class="mt-6 w-full flex justify-center">
  <div class="relative w-full max-w-md group">
    
    <!-- Search Input -->
    <input
      type="text"
      placeholder="Search notices, PYQs, and campus events..."
      class="
        w-full
        pl-12 pr-4 py-3
        rounded-full
        border border-indigo-400
        bg-white
        shadow-md

        transition-all duration-300 ease-in-out
        group-hover:shadow-xl
        group-hover:scale-[1.02]

        focus:outline-none
        focus:ring-4
        focus:ring-indigo-300
        focus:border-indigo-600
      "
    />

    <!-- Icon -->
    <span
      class="
        absolute left-4 top-1/2 -translate-y-1/2
        text-indigo-600
        transition-transform duration-300
        group-hover:scale-110
        group-focus-within:rotate-12
      "
    >
      🔍
    </span>

  </div>
</div>

</main>













 <div class="fixed bottom-0 left-0 w-full z-50 overflow-hidden bg-white/10 backdrop-blur-sm h-1">
    
    <div class="absolute inset-0 w-[200%] flex animate-[water-flow_5s_linear_infinite]">
        <div class="w-full h-full bg-linear-to-r from-blue-900 via-indigo-600 to-purple-600"></div>
        <div class="w-full h-full bg-linear-to-r from-blue-900 via-indigo-600 to-purple-600"></div>
    </div>
</div>

<div class="fixed bottom-1 left-0 w-full bg-white/95 border-t border-gray-100 py-1 md:py-2 px-4 shadow-lg overflow-hidden flex items-center">
    <div class="bg-indigo-700 text-white text-[9px] md:text-xs font-bold px-2 py-0.5 rounded mr-3 uppercase">News:</div>
    <div class="flex-1 overflow-hidden">
        <div class="inline-block whitespace-nowrap animate-[marquee_20s_linear_infinite] text-[10px] md:text-sm text-indigo-950 font-medium">
             📅 Mid-term dates are out • 📚 Download previous Sem PYQs • 🚀 New Event: .......
        </div>
    </div>
</div>

<style>
@keyframes water-flow {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
}
@keyframes marquee {
    0% { transform: translateX(100%); }
    100% { transform: translateX(-100%); }
}
</style>








</body>
</html>
