<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events Timeline | Veltrix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #020617; overflow-x: hidden; font-family: 'Inter', sans-serif; }
        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #312e81; border-radius: 10px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-slate-300">

   <nav class="bg-indigo-950 border-b border-indigo-900 text-white px-6 py-4 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto flex flex-col md:flex-row md:items-center md:justify-between">
        
        <input type="checkbox" id="menu" class="hidden peer">

        <div class="flex justify-between items-center w-full md:w-auto">
            <div class="flex items-center gap-2">
                <img src="logo.png" alt="Logo" class="h-14 w-auto">
                <span class="font-bold text-sm md:text-lg tracking-wide uppercase">RB-Portal</span>
            </div>
            
            <label for="menu" class="md:hidden cursor-pointer p-2 hover:bg-white/10 rounded-lg transition-colors z-[110] relative">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white peer-checked:hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
                </svg>
            </label>
        </div>


        <ul id="mobile-menu" class="fixed top-0 right-[-100%] h-screen w-[75%] bg-indigo-950 shadow-2xl z-[120] flex flex-col p-8 space-y-6 transition-all duration-500 ease-in-out 
                   peer-checked:right-0 md:static md:h-auto md:w-auto md:bg-transparent md:shadow-none md:flex-row md:p-0 md:space-y-0 md:space-x-8 md:transition-none md:flex">
            
            <li class="md:hidden flex justify-between items-center mb-6 border-b border-indigo-800 pb-4">
                <span class="font-black text-indigo-400 uppercase tracking-[0.2em] text-xs">Navigation</span>
                <label for="menu" class="text-2xl cursor-pointer hover:rotate-90 transition-transform p-2">✕</label>
            </li>

            <li><a href="index.html" class="text-sm font-medium text-slate-300 hover:text-indigo-400 transition">Home</a></li>
            <li><a href="notice.html" class="text-sm font-medium text-slate-300 hover:text-indigo-400 transition">Notice</a></li>
            <li><a href="pyqs.html" class="text-sm font-medium text-slate-300 hover:text-indigo-400 transition">PYQs</a></li>
            <li><a href="notes.html" class="text-sm font-medium text-slate-300 hover:text-indigo-400 transition">Notes</a></li>
            <li><a href="events.html" class="text-sm font-bold text-indigo-400 border-b-2 border-indigo-400 md:pb-1 inline-block">Events</a></li>
            <li><a href="about.html" class="text-sm font-medium text-slate-300 hover:text-indigo-400 transition">About</a></li>
            <li><a href="contact.html" class="text-sm font-medium text-slate-300 hover:text-indigo-400 transition">Contact</a></li>
        </ul>

        <label for="menu" class="fixed inset-0 bg-black/60 hidden peer-checked:block md:peer-checked:hidden z-[100] backdrop-blur-sm transition-opacity"></label>
    </div>
</nav>

    <section class="relative py-20 border-b border-white/5">
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full h-full bg-indigo-600/5 blur-[120px] pointer-events-none"></div>
        <div class="max-w-7xl mx-auto px-6 text-center relative z-10">
            <h1 class="text-4xl md:text-6xl font-black text-white mb-4 tracking-tighter italic">EVENT <span class="text-indigo-500 italic">LOGS</span></h1>
            <p class="text-slate-500 text-sm md:text-base font-medium max-w-xl mx-auto uppercase tracking-[0.2em]">Academic & Cultural Timeline 2026</p>
        </div>
    </section>

    <main class="max-w-7xl mx-auto px-6 py-12">
        
        <div id="featuredEvent" class="mb-16 animate-[fadeIn_0.5s_ease-out]"></div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10 items-start">
            
            <div class="lg:col-span-8">
                <div class="flex items-center gap-3 mb-8">
                    <span class="h-6 w-1 bg-indigo-500 rounded-full"></span>
                    <h2 class="text-xl font-black text-white uppercase tracking-widest">Upcoming Feed</h2>
                </div>
                <div id="eventList" class="space-y-6">
                    </div>
            </div>

            <div class="lg:col-span-4 sticky top-28">
                <div class="glass-card rounded-[2rem] p-6 border border-white/5 shadow-2xl">
                    <div class="flex items-center gap-3 mb-6 px-2">
                        <i class="fas fa-archive text-slate-500 text-sm"></i>
                        <h2 class="text-sm font-black text-slate-300 uppercase tracking-widest">History</h2>
                    </div>
                    <div id="pastEventList" class="space-y-4 max-h-[500px] overflow-y-auto pr-2 custom-scrollbar">
                        </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function renderEvents(data) {
            const featuredContainer = document.getElementById("featuredEvent");
            const upcomingContainer = document.getElementById("eventList");
            const pastContainer = document.getElementById("pastEventList");

            featuredContainer.innerHTML = "";
            upcomingContainer.innerHTML = "";
            pastContainer.innerHTML = "";

            const today = new Date().setHours(0,0,0,0);
            data.sort((a, b) => new Date(a.eventDate) - new Date(b.eventDate));

            let featuredSet = false;

            data.forEach(event => {
                const eventDate = new Date(event.eventDate).setHours(0,0,0,0);

                if (eventDate >= today && !featuredSet) {
                    featuredContainer.innerHTML = `
                        <div class="glass-card rounded-[2.5rem] p-8 md:p-12 border border-indigo-500/20 relative overflow-hidden group">
                            <div class="absolute top-0 right-0 p-8 opacity-10 group-hover:opacity-20 transition-opacity">
                                <i class="fas fa-bolt text-9xl text-indigo-500"></i>
                            </div>
                            <div class="relative z-10">
                                <span class="bg-indigo-600 text-white text-[10px] px-3 py-1 rounded-full font-black uppercase tracking-widest mb-6 inline-block">Featured Today</span>
                                <h2 class="text-3xl md:text-5xl font-black text-white mb-6 leading-none tracking-tighter">${event.title}</h2>
                                <div class="flex flex-wrap gap-6 text-slate-400 text-xs font-bold uppercase mb-8">
                                    <span><i class="far fa-calendar mr-2"></i>${event.eventDate}</span>
                                    <span><i class="fas fa-location-dot mr-2"></i>${event.venue}</span>
                                </div>
                                <p class="text-slate-400 text-base md:text-lg max-w-2xl mb-10 leading-relaxed">${event.summary}</p>
                                <a href="event-detail.html?id=${event.id}" class="inline-block bg-white text-black px-8 py-4 rounded-2xl font-black text-xs uppercase hover:bg-indigo-500 hover:text-white transition-all shadow-xl">Explore Now</a>
                            </div>
                        </div>`;
                    featuredSet = true;
                } else if (eventDate >= today) {
                    upcomingContainer.innerHTML += `
                        <div class="glass-card rounded-3xl p-6 border border-white/5 hover:border-indigo-500/30 transition-all group shadow-xl">
                            <div class="flex flex-col md:flex-row justify-between gap-6">
                                <div class="flex-1">
                                    <h3 class="text-xl font-bold text-white group-hover:text-indigo-400 transition-colors mb-2">${event.title}</h3>
                                    <p class="text-slate-500 text-xs font-bold uppercase tracking-widest mb-4 italic">${event.eventDate} &bull; ${event.venue}</p>
                                    <p class="text-slate-400 text-sm line-clamp-2 leading-relaxed">${event.summary}</p>
                                </div>
                                <div class="flex items-center">
                                    <a href="event-detail.html?id=${event.id}" class="w-full md:w-auto bg-slate-800 hover:bg-indigo-600 text-white px-6 py-3 rounded-xl text-xs font-black uppercase transition-all">Details</a>
                                </div>
                            </div>
                        </div>`;
                } else {
                    pastContainer.innerHTML += `
                        <a href="event-detail.html?id=${event.id}" class="block p-4 rounded-2xl bg-white/5 border border-white/5 hover:bg-white/10 transition-all group">
                            <h4 class="text-xs font-bold text-slate-300 group-hover:text-white transition-colors uppercase tracking-tight line-clamp-1">${event.title}</h4>
                            <p class="text-[9px] text-slate-500 mt-1 font-black italic uppercase">${event.eventDate}</p>
                        </a>`;
                }
            });
        }

        fetch("http://localhost:8080/events")
            .then(res => res.json())
            .then(data => renderEvents(data))
            .catch(err => console.error("Error:", err));
    </script>
</body>
</html>
